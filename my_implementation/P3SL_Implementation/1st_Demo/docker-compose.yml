version: "3.9"

services:
  server:
    build: ./server
    container_name: socket-server
    ports:
      - "5000:5000"
    volumes:
      - ./dataset/data:/data
      - ./server:/app

  client1:
    build: ./client1
    container_name: socket-client1
    volumes:
      - ./dataset/data:/data
      - ./client1:/app
    depends_on:
      - server

  client2:
    build: ./client2
    image: normal-client-base
    container_name: socket-client2
    volumes:
      - ./dataset/data:/data
      - ./client2:/app
    depends_on:
      - server

  client3:
    image: normal-client-base
    container_name: socket-client3
    command: ["python", "client3.py"]
    volumes:
      - ./dataset/data:/data
      - ./client3:/app
    depends_on:
      - server

  client4:
    image: normal-client-base
    container_name: socket-client4
    command: ["python", "client4.py"]
    volumes:
      - ./dataset/data:/data
      - ./client4:/app
    depends_on:
      - server

  client5:
    image: normal-client-base
    container_name: socket-client5
    command: ["python", "client5.py"]
    volumes:
      - ./dataset/data:/data
      - ./client5:/app
    depends_on:
      - server
